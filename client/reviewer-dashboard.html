<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviewer Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Reviewer Dashboard</h1>
      <p class="subtitle">Papers Assigned for Review</p>
    </header>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All Papers</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="in_progress">In Progress</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <div id="loading" class="loading">Loading papers...</div>
    <div id="error" class="error" style="display:none;"></div>
    
    <div id="papersContainer" class="papers-grid">
      <!-- Papers will be loaded here -->
    </div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <p>No papers assigned yet</p>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
